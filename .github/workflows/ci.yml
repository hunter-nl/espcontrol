name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ESPCONTROL_NPM_CACHE_MAX_MB: 512

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Generated Files
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - run: python3 scripts/build.py --check
      - run: python3 scripts/generate_device_slots.py --check
      - run: python3 scripts/check_icon_groups.py
      - run: npm run check:config

  docs:
    name: Build Docs
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - run: npm run docs:build
