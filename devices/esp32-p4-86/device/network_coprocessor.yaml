# =============================================================================
# NETWORK CO-PROCESSOR - WiFi firmware variant
# =============================================================================
# The Waveshare ESP32-P4 86 Panel uses an ESP32-C6 co-processor for hosted
# WiFi/BLE over SDIO. This is only needed by the normal WiFi firmware.
# =============================================================================

esp32_hosted:
  id: esp32_c6_hosted
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz

logger:
  level: DEBUG
  logs:
    esp32_hosted: DEBUG
    esp32_hosted.update: DEBUG

http_request:

update:
  - platform: esp32_hosted
    id: esp32_c6_update
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 24h

text_sensor:
  - platform: template
    name: "ESP32-C6: Update Available"
    entity_category: DIAGNOSTIC
    id: c6_update_available
    lambda: |-
      auto upd = id(esp32_c6_update);
      if (!upd) return std::string("Unknown");
      if (upd->state == esphome::update::UpdateState::UPDATE_STATE_AVAILABLE)
        return std::string("Update available");
      else
        return std::string("Up-to-date");

  - platform: template
    name: "ESP32-C6: Current Firmware"
    entity_category: DIAGNOSTIC
    id: c6_update_current_firmware
    icon: mdi:chip
    lambda: |-
      auto upd = id(esp32_c6_update);
      if (!upd) return std::string("Unknown");
      auto &cur = upd->update_info.current_version;
      if (cur.empty()) return std::string("Unknown");
      return cur;
    update_interval: 60s

  - platform: template
    name: "ESP32-C6: Latest Firmware"
    entity_category: DIAGNOSTIC
    id: c6_update_latest_firmware
    icon: mdi:chip
    lambda: |-
      auto upd = id(esp32_c6_update);
      if (!upd) return std::string("Unknown");
      auto &lat = upd->update_info.latest_version;
      if (lat.empty()) return std::string("Unknown");
      return lat;
    update_interval: 60s

button:
  - platform: template
    name: "Firmware ESP32-C6: Install Update"
    entity_category: CONFIG
    icon: mdi:download
    on_press:
      then:
        - logger.log:
            level: WARN
            format: "Installing ESP32-C6 firmware update..."
        - update.perform:
            id: esp32_c6_update

  - platform: template
    name: "Firmware ESP32-C6: Check for Update"
    entity_category: CONFIG
    icon: mdi:update
    on_press:
      then:
        - logger.log:
            level: WARN
            format: "Checking if ESP32-C6 firmware update is available..."
        - update.check:
            id: esp32_c6_update
